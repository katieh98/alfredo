schema {
  query: Query
}

type User {
  discordId: ID!
  dietaryRestrictions: [String!]!
  cuisinePreferences: [String!]!
  priceRange: String!
  bookingName: String!
  bookingPhone: String!
  bookingEmail: String!
}

type Query {
  users(ids: [ID!]!): [User!]!
  restaurants(near: String!, partySize: Int!, availableIn: [TimeSlotInput!]!): [Restaurant!]!
  hotels(near: String!, partySize: Int!, availableIn: [HotelSlotInput!]!): [Hotel!]!
}

type Restaurant {
  id: ID!
  name: String!
  cuisine: String!
  priceRange: String!
  rating: Float!
  openTableId: String
  availableSlots: [TimeSlot!]!
  enrichment: RestaurantEnrichment!
}

type TimeSlot {
  date: String!
  time: String!
}

type RestaurantEnrichment {
  topDishes: [String!]!
  vibeSummary: String!
  transitInfo: String!
}

input TimeSlotInput {
  date: String!
  startTime: String!
  endTime: String!
}

type Hotel {
  id: ID!
  name: String!
  category: String!
  priceRange: String!
  rating: Float!
  phone: String
  availableNights: [HotelNight!]!
  enrichment: HotelEnrichment!
}

type HotelNight {
  checkIn: String!
  checkOut: String!
}

type HotelEnrichment {
  amenities: [String!]!
  vibeSummary: String!
  address: String!
}

input HotelSlotInput {
  checkIn: String!
  checkOut: String!
}