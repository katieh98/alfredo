extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key"])

type User @key(fields: "discordId") {
  discordId: ID!
  dietaryRestrictions: [String!]!
  cuisinePreferences: [String!]!
  priceRange: String!
  bookingName: String!
  bookingPhone: String!
  bookingEmail: String!
}

type Query {
  users(ids: [ID!]!): [User!]!
}
